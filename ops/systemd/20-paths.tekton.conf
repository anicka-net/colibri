# Host-local paths for the Tekton deployment checkout.
[Service]
WorkingDirectory=%h/colibri-dev/c
ExecStartPre=
ExecStartPre=%h/colibri-dev/ops/colibri-preflight.sh
ExecStart=
ExecStart=%h/colibri-dev/c/coli-native serve --model ${COLI_MODEL} --host ${COLI_HOST} --port ${COLI_PORT} --model-id ${COLI_MODEL_ID} --default-thinking --context-length ${COLI_CONTEXT} --cap ${COLI_CAP} --ctx ${COLI_CONTEXT} --ngen ${COLI_MAX_TOKENS} --expert-bits ${COLI_EXPERT_BITS} --dense-bits ${COLI_DENSE_BITS} --kv-slots ${COLI_KV_SLOTS} --cors-origin ${COLI_CORS_ORIGIN}
